			margin: 0;
			padding: 0;
			box-sizing: border-box
		}

			--red: #e03020;
			--cream: #f0ece3
		}

		html,
		body {
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: #0a0a0a
		}

		body {
			cursor: none
		}

		#app {
			position: relative;
			width: 100dvw;
			height: 100dvh
		}

		#bg-canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			z-index: 0
		}

		#three-canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			z-index: 1;
			pointer-events: none
		}

		#crt-canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			z-index: 2;
			pointer-events: none
		}

		#overlay {
			position: absolute;
			inset: 0;
			pointer-events: none;
			font-family: 'Bebas Neue', sans-serif;
			z-index: 3
		}

		.label {
			position: absolute;
			color: var(--cream);
			text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
			animation: fA 1s ease both
		}

		a.label {
			text-decoration: none;
			pointer-events: all;
			transition: color .2s
		}

		a.label:hover {
			color: var(--red)
		}

		.t1 {
			top: 4vh;
			left: 4vw;
			font-size: clamp(1rem, 3.5vw, 2.8rem);
			letter-spacing: .04em;
			animation-delay: .4s
		}

		.t2 {
			top: 4vh;
			right: 4vw;
			font-size: clamp(1.2rem, 4.5vw, 3.8rem);
			letter-spacing: .06em;
			text-align: right;
			animation-delay: .5s
		}

		.sl {
			left: 3vw;
			top: 50%;
			transform: translateY(-50%) rotate(-90deg);
			font-size: clamp(.65rem, 1.6vw, 1.3rem);
			letter-spacing: .16em;
			white-space: nowrap;
			font-family: 'Space Mono', monospace;
			animation-delay: .8s
		}

		.sr {
			right: 3vw;
			top: 50%;
			transform: translateY(-50%) rotate(90deg);
			font-size: clamp(.65rem, 1.6vw, 1.3rem);
			letter-spacing: .16em;
			white-space: nowrap;
			font-family: 'Space Mono', monospace;
			animation-delay: .9s
		}

		.b1 {
			position: absolute;
			bottom: 3vh;
			left: 0;
			right: 0;
			display: flex;
			justify-content: center;
			pointer-events: none;
			z-index: 4
		}

		.b2 {
			font-family: 'Bebas Neue', sans-serif;
			font-size: clamp(1rem, 3vw, 2.4rem);
			letter-spacing: .1em;
			display: flex;
			align-items: center;
			gap: clamp(.6rem, 2.5vw, 2rem);
			white-space: nowrap;
			pointer-events: all;
			opacity: 0;
			animation: bA 1s .7s ease forwards
		}

		.b2 a {
			color: var(--cream);
			text-decoration: none;
			text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
			border-bottom: 2px solid transparent;
			padding-bottom: 2px;
			transition: color .2s, border-color .2s
		}

		.b2 a:hover {
			color: var(--red);
			border-color: var(--red)
		}

		.b2 .s1 {
			color: var(--cream);
			opacity: .4;
			text-shadow: 1px 1px 0 #000
		}

		@keyframes fA {
			from {
				opacity: 0;
				transform: translateY(8px)
			}

			to {
				opacity: 1;
				transform: translateY(0)
			}
		}

		@keyframes bA {
			from {
				opacity: 0
			}

			to {
				opacity: 1
			}
		}

		#c1 {
			position: fixed;
			width: 10px;
			height: 10px;
			background: var(--red);
			border-radius: 50%;
			pointer-events: none;
			z-index: 9999;
			mix-blend-mode: difference;
			transform: translate(-50%, -50%);
			transition: width .2s, height .2s
		}

		#c1.big {
			width: 40px;
			height: 40px
		}

		#t3 {
			position: fixed;
			pointer-events: none;
			z-index: 10000;
			background: rgba(10, 10, 10, .92);
			border: 1px solid var(--red);
			color: var(--cream);
			font-family: 'Space Mono', monospace;
			font-size: .7rem;
			letter-spacing: .04em;
			padding: .35em .6em;
			max-width: 220px;
			white-space: normal;
			line-height: 1.4;
			opacity: 0;
			transition: opacity .15s;
			transform: translate(18px, -50%)
		}

		#t3.visible {
			opacity: 1
		}

		.m1 {
			display: none;
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, .78);
			z-index: 5000;
			align-items: center;
			justify-content: center;
			backdrop-filter: blur(4px)
		}

		.m1.open {
			display: flex
		}

		.m2 {
			position: relative;
			background: #0f0f0f;
			border: 1px solid #2a2a2a;
			border-top: 2px solid var(--red);
			color: var(--cream);
			font-family: 'Space Mono', monospace;
			width: min(520px, 92vw);
			max-height: 82vh;
			overflow-y: auto;
			padding: 2rem 2rem 1.8rem;
			animation: mA .22s ease both;
			scrollbar-width: thin;
			scrollbar-color: var(--red) #1a1a1a
		}

		.m2::-webkit-scrollbar {
			width: 5px
		}

		.m2::-webkit-scrollbar-track {
			background: #1a1a1a
		}

		.m2::-webkit-scrollbar-thumb {
			background: var(--red)
		}

		@keyframes mA {
			from {
				opacity: 0;
				transform: translateY(14px) scale(.97)
			}

			to {
				opacity: 1;
				transform: translateY(0) scale(1)
			}
		}

		.m3 {
			position: absolute;
			top: .9rem;
			right: 1rem;
			background: none;
			border: none;
			color: var(--cream);

			cursor: none;
			opacity: .6;
			transition: opacity .15s, color .15s
		}

		.m3:hover {
			opacity: 1;
			color: var(--red)
		}

		.m2 h2 {
			font-family: 'Bebas Neue', sans-serif;
			font-size: 1.8rem;
			letter-spacing: .08em;
			color: var(--red);
			margin-bottom: 1.4rem
		}

		.m2 h3 {
			font-family: 'Bebas Neue', sans-serif;
			font-size: 1.1rem;
			letter-spacing: .1em;

			padding-bottom: .3rem;

		}

			margin-top: 0
		}

			color: var(--red);
			font-size: .78rem;
			letter-spacing: .05em;

		}

		}

			letter-spacing: .06em;

		}

		.c5 a:hover {
			color: var(--red)
		}

			width: 18px;
			flex-shrink: 0;
			opacity: .7
		}

		.dZ0 {
			display: none !important;
			position: absolute;
			z-index: -999
		}
